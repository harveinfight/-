<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* お上品な見た目（ドレス）を整えるCSSですわ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f9f4; /* 目に優しい薄緑ですわ */
            color: #333;
            text-align: center;
        }
        header {
            background-color: #627BC1; /* 地図の国と同じ高貴な青ですわ */
            color: white;
            
        }
        h1 { margin: 0; font-size: 32px; }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        p { font-size: 18px; line-height: 1.6; }
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #228b22;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        .btn-back {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background-color: #228b22;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
    }

    /* ⬇★ここから下を新しく追加してください！ ★⬇ */
    .image-wrapper {
        position: relative;
        display: block; 
        max-width: 100%;
    }

    .image-wrapper img {
        width: 100%;
        height: auto;
        display: block;
    }

    .overlay-text {
        position: absolute;
        top: 20%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        font-weight: bold;
        margin: 0; /* 余計な隙間を消すために念のため追加 */
        font-family: 'M PLUS Rounded 1c', Comic Sans MS;
    }
    /* ⬆★ここまで★ ⬆ */
    </style>
</head>
<body>

    <header>
        <div class="image-wrapper">
            <img src="utyuu.jpg" alt="名" width="1920" height="1080">
            <p class="overlay-text">スエズ運河は小貝川15個分の大きさ</p>
        </div>
    
        <h1></h1>
        
    </header>

    <div class="container">
        <h2></h2>
        <p>ポータルサイト</p>
        
        
        <a href="tizu.html" class="btn-back">地図を閲覧。</a>
    </div>

</body>
</html>
