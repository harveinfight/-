<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>麗しきハワイ王国 公式サイト</title>
    <style>
        /* お上品な見た目（ドレス）を整えるCSSですわ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f9f4; /* 目に優しい薄緑ですわ */
            color: #333;
            text-align: center;
        }
        header {
            background-color: #627BC1; /* 地図の国と同じ高貴な青ですわ */
            color: white;
            padding: 40px 20px;
        }
        h1 { margin: 0; font-size: 32px; }
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        p { font-size: 18px; line-height: 1.6; }
        .btn-back {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #228b22;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌺 麗しきハワイ王国 🌺</h1>
        <p>〜 創造主たる貴方の地図に浮かぶ、美しき常夏の楽園 〜</p>
    </header>

    <div class="container">
        <h2>アロハ！ようこそ我が領土へ</h2>
        <p>ここは、地図上のタップから繋がる特別なポータルサイトですわ。</p>
        <p>透き通るような青い海と、美味しいパンケーキ、そして完璧な MultiPolygon の座標によって構成された、世界で最も美しい島々でございます。</p>
        
        <a href="#" onclick="window.close(); return false;" class="btn-back">地図の閲覧に戻るですわ</a>
    </div>

</body>
</html>
